<nav [class.scrolled]="scrolled()">
  <div class="container nav-inner">
    <a class="logo" href="#hero">AJ</a>

    <ul class="nav-links" [class.open]="menuOpen()">
      @for (link of links; track link.label) {
        <li>
          <a [href]="link.href" (click)="closeMenu()">{{ link.label }}</a>
        </li>
      }
      <li>
        <a class="cta" href="mailto:alaynajohnston12@gmail.com" (click)="closeMenu()">Hire Me</a>
      </li>
    </ul>

    <button class="theme-toggle" (click)="theme.toggle()" [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
      @if (theme.isDark()) {
        <!-- Sun icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7a5 5 0 100 10A5 5 0 0012 7zm0-5a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm0 17a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM4.22 4.22a1 1 0 011.42 0l.7.7a1 1 0 01-1.42 1.42l-.7-.7a1 1 0 010-1.42zm13.44 13.44a1 1 0 011.42 0l.7.7a1 1 0 01-1.42 1.42l-.7-.7a1 1 0 010-1.42zM3 12a1 1 0 011-1h1a1 1 0 110 2H4a1 1 0 01-1-1zm16 0a1 1 0 011-1h1a1 1 0 110 2h-1a1 1 0 01-1-1zM4.22 19.78a1 1 0 010-1.42l.7-.7a1 1 0 111.42 1.42l-.7.7a1 1 0 01-1.42 0zm13.44-13.44a1 1 0 010-1.42l.7-.7a1 1 0 111.42 1.42l-.7.7a1 1 0 01-1.42 0z"/></svg>
      } @else {
        <!-- Moon icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
      }
    </button>

    <button class="hamburger" (click)="toggleMenu()" [attr.aria-label]="menuOpen() ? 'Close menu' : 'Open menu'">
      <span [class.open]="menuOpen()"></span>
      <span [class.open]="menuOpen()"></span>
      <span [class.open]="menuOpen()"></span>
    </button>
  </div>
</nav>
